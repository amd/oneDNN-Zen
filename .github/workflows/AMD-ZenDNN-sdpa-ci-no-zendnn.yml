#
# Caller workflow on zendnn-onednn-sdpa with ZenDNN disabled.
# - Build only, no smoke tests
# - /retest comment on PR re-runs CI
# *******************************************************************************

name: ZenDNN SDPA CI (no ZenDNN)

on:
  push:
    branches: [zendnn-onednn-sdpa]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [zendnn-onednn-sdpa]
  issue_comment:
    types: [created]

concurrency:
  group: zendnn-sdpa-ci-no-zendnn-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  # Check if this is a /retest command on a PR
  check-retest:
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '/retest'))
    runs-on: [self-hosted, jira_check_runner]
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check trigger
        id: check
        env:
          GH_TOKEN: ${{ secrets.ZIAIE_PAT }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "Triggered by /retest comment on PR #${{ github.event.issue.number }}"
            PR_BASE=$(curl -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['base']['ref'])")
            if [ "${PR_BASE}" = "zendnn-onednn-sdpa" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "PR base is ${PR_BASE}, not zendnn-onednn-sdpa. Skipping."
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  sdpa-no-zendnn:
    needs: check-retest
    if: needs.check-retest.outputs.should_run == 'true'
    uses: AMD-Zenai/oneDNN-Zen/.github/workflows/zendnn-ci-reusable.yml@zendnn-ci
    with:
      dnnl_x64_use_zen: false
      run_tests: false
      target_branch: zendnn-onednn-sdpa
    secrets: inherit
